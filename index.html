<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="Cartão, HTML, CSS">
    <meta name="description" content="Um cartão de crédito criado com HTML e CSS.">
    <meta name="author" content="Miguel Oliveira">
    <meta name="robots" content="index,follow">
    <meta name="X-UA-Compatible" content="IE=7">
    <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Cartão de crédito</title>
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">
                <img src="img/logo.png" alt="" />
                <h5>Master Card</h5>
            </span>
            <img src="img/chip.png" alt="" class="chip" />
        </header>
        <div class="card-details">
            <div class="name-number">
                <h6>Número do cartão</h6>
                <h5 class="number">8050 5340 3523 3520</h5>
                <h5 class="name">Miguel Bananilson Oliveira</h5>
            </div>
            <div class="valid-date">
                <h6>Validade</h6>
                <h5>05/28</h5>
            </div>
        </div>
    </div>
</body>
</html>
